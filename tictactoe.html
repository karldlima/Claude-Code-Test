<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.2rem;
      letter-spacing: 4px;
      margin-bottom: 24px;
      text-transform: uppercase;
      color: #e0e0e0;
    }

    #status {
      font-size: 1.1rem;
      margin-bottom: 20px;
      height: 28px;
      color: #a0c4ff;
      font-weight: 600;
      letter-spacing: 1px;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.taken { cursor: default; }

    .cell.x { color: #ff6b6b; }
    .cell.o { color: #51cf66; }

    .cell.win {
      background: #0f3460;
      border-color: #a0c4ff;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    #scores {
      display: flex;
      gap: 40px;
      margin-top: 28px;
      font-size: 1rem;
      letter-spacing: 1px;
    }

    .score-box {
      text-align: center;
    }

    .score-box .label { color: #888; font-size: 0.8rem; text-transform: uppercase; }
    .score-box .val   { font-size: 1.8rem; font-weight: 700; margin-top: 2px; }
    #score-x .val { color: #ff6b6b; }
    #score-o .val { color: #51cf66; }
    #score-d .val { color: #aaa; }

    #restart {
      margin-top: 28px;
      padding: 10px 32px;
      background: none;
      border: 2px solid #0f3460;
      border-radius: 8px;
      color: #a0c4ff;
      font-size: 0.95rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    #restart:hover {
      background: #0f3460;
      border-color: #a0c4ff;
    }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">X's turn</div>
  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div id="scores">
    <div class="score-box" id="score-x">
      <div class="label">X Wins</div>
      <div class="val" id="x-val">0</div>
    </div>
    <div class="score-box" id="score-d">
      <div class="label">Draws</div>
      <div class="val" id="d-val">0</div>
    </div>
    <div class="score-box" id="score-o">
      <div class="label">O Wins</div>
      <div class="val" id="o-val">0</div>
    </div>
  </div>

  <button id="restart">New Game</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, over, scores = {X:0, O:0, D:0};

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      over = false;
      document.querySelectorAll('.cell').forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      setStatus("X's turn");
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
    }

    function checkWin() {
      for (const [a,b,c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c])
          return [a,b,c];
      }
      return null;
    }

    document.querySelectorAll('.cell').forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (over || board[i]) return;

        board[i] = current;
        cell.textContent = current;
        cell.classList.add('taken', current.toLowerCase());

        const win = checkWin();
        if (win) {
          win.forEach(idx =>
            document.querySelector(`[data-i="${idx}"]`).classList.add('win')
          );
          scores[current]++;
          updateScores();
          setStatus(`${current} wins!`);
          over = true;
        } else if (board.every(Boolean)) {
          scores.D++;
          updateScores();
          setStatus("It's a draw!");
          over = true;
        } else {
          current = current === 'X' ? 'O' : 'X';
          setStatus(`${current}'s turn`);
        }
      });
    });

    function updateScores() {
      document.getElementById('x-val').textContent = scores.X;
      document.getElementById('o-val').textContent = scores.O;
      document.getElementById('d-val').textContent = scores.D;
    }

    document.getElementById('restart').addEventListener('click', init);

    init();
  </script>
</body>
</html>
